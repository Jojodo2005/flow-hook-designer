    }

    function colorizeSvgInner(inner, colors = null) {
      const mainColor = (colors && colors.mainColor) || state.mainColor || "#a45858";
      const hookColor = (colors && colors.hookColor) || state.hookColor || "#5b3434";
      return inner
        // primary body color
        .replace(/rgb\(164,\s*88,\s*88\)/g, mainColor)
        .replace(/#a45858/gi, mainColor)
        .replace(/fill:\s*rgb\(164,\s*88,\s*88\)/g, "fill: " + mainColor)
        .replace(/fill="rgb\(164,\s*88,\s*88\)"/g, 'fill="' + mainColor + '"')
        // secondary hook / dot / screw color
        .replace(/rgb\(91,\s*52,\s*52\)/g, hookColor)
        .replace(/rgb\(88,\s*44,\s*44\)/g, hookColor)
        .replace(/rgb\(39,\s*23,\s*23\)/g, hookColor);
    }

    function currentColors() {
      return { mainColor: state.mainColor, hookColor: state.hookColor };
    }

    function setSelectedHookColor(color) {
      state.placed.forEach(inst => {
        if (state.selection.has(inst.id)) {
          inst.hookColor = color;
        }
      });
      render();
    }

    function setSelectedMainColor(color) {
      saveState();
      state.placed.forEach(inst => {
        if (state.selection.has(inst.id)) {
          inst.mainColor = color;
        }
      });
      render();
    }

    function makeSvgMarkup(part, w = part.width, h = part.height, colors = null) {
      return `<svg xmlns="${svgNS}" viewBox="${part.viewBox}" width="${w}" height="${h}">${colorizeSvgInner(part.svgInner, colors)}</svg>`;
    }

    function createNestedSvg(part, colors = null) {
      const wrapper = document.createElementNS(svgNS, "svg");
      wrapper.setAttribute("class", "shape-svg");
      wrapper.setAttribute("x", -part.width / 2);
      wrapper.setAttribute("y", -part.height / 2);
      wrapper.setAttribute("width", part.width);
      wrapper.setAttribute("height", part.height);
      wrapper.setAttribute("viewBox", part.viewBox);
      wrapper.innerHTML = colorizeSvgInner(part.svgInner, colors);
      return wrapper;
    }

    function screenToWorld(ev) {
      const pt = stage.createSVGPoint();
      pt.x = ev.clientX; pt.y = ev.clientY;
      const ctm = viewport.getScreenCTM();
      return pt.matrixTransform(ctm.inverse());
    }

    function snapGrid(v) {
      return Math.round(v / CONFIG.gridSize) * CONFIG.gridSize;
    }

    function rotatePoint(p, rot) {
      const rad = ((rot % 360) + 360) % 360 * Math.PI / 180;
      const cos = Math.cos(rad);
      const sin = Math.sin(rad);

      return {
        x: p.x * cos - p.y * sin,
        y: p.x * sin + p.y * cos
      };
    }

    function transformPoint(p, rotation, mirrored = false) {
      let rp = rotatePoint(p, rotation);

      if (mirrored) {
        rp.x = -rp.x;
      }

      return rp;
    }


    function transformDirection(dir, rotation, mirrored = false) {
      let d = rotateDirection(dir, rotation);

      if (mirrored) {
        d = (360 - d) % 360;
      }

      return d;
    }

    function rotateDirection(dir, rot) {
      return ((dir + rot) % 360 + 360) % 360;
    }

    function angleDiff(a, b) {
      return Math.abs(((a - b + 540) % 360) - 180);
    }

    function angleDistance(a, b) {
      return Math.abs(((a - b + 540) % 360) - 180);
    }

    function oppositeDirections(a, b) {
      return angleDistance((a + 180) % 360, b) <= 1;
    }

    function getPart(id) {
      return PARTS.find(p => p.id === id);
    }

    function worldSnapPoints(instance) {
      const part = getPart(instance.partId);
      return part.snapPoints.map(sp => {
        const rp = transformPoint(sp, instance.rotation, instance.mirrored);
        return {
          instanceId: instance.id,
          snapId: sp.id,
          x: instance.x + rp.x,
          y: instance.y + rp.y,
          direction: transformDirection(sp.direction, instance.rotation, instance.mirrored),
          occupied: isSnapOccupied(instance.id, sp.id)
        };
      });
    }

    function isSnapOccupied(instanceId, snapId, ignoreIds = new Set()) {
      return state.connections.some(c => {
        if (ignoreIds.has(c.a.instanceId) || ignoreIds.has(c.b.instanceId)) return false;
        return (c.a.instanceId === instanceId && c.a.snapId === snapId) ||
          (c.b.instanceId === instanceId && c.b.snapId === snapId);
      });
    }

    function allOpenSnapPoints(excludeIds = new Set(), ignoreIds = new Set()) {
      return state.placed
        .filter(inst => !excludeIds.has(inst.id))
        .flatMap(inst => {
          const part = getPart(inst.partId);
          return part.snapPoints.map(sp => {
            const rp = transformPoint(sp, inst.rotation, inst.mirrored);
            return {
              instanceId: inst.id,
              snapId: sp.id,
              x: inst.x + rp.x,
              y: inst.y + rp.y,
              direction: transformDirection(sp.direction, inst.rotation, inst.mirrored),
              occupied: isSnapOccupied(inst.id, sp.id, ignoreIds)
            };
          });
        })
        .filter(sp => !sp.occupied);
    }


    function lockPageScroll() {
      document.body.classList.add("palette-dragging");
      const paletteEl = document.querySelector(".palette-scroll");
      if (paletteEl) paletteEl.style.overflow = "hidden";
    }

    function unlockPageScroll() {
      document.body.classList.remove("palette-dragging");
      const paletteEl = document.querySelector(".palette-scroll");
      if (paletteEl) paletteEl.style.overflow = "";
    }

    function startPlacing(part, ev) {
      ev.preventDefault();
      ev.stopPropagation();

      state.mode = "placing";
      state.paletteDrag = true;
      state.draggingPart = part;
      state.ghost = {
        partId: part.id,
        x: 0,
        y: 0,
        rotation: 0,
        snapCandidate: null,
        visible: false,
        mainColor: state.mainColor,
        hookColor: state.hookColor
      };
      state.selection.clear();
      lockPageScroll();

      updateDragPreview(ev);
      updatePaletteDrag(ev);

      try { ev.currentTarget.setPointerCapture?.(ev.pointerId); } catch (e) { }
      window.addEventListener("pointermove", handlePaletteDragMove, { passive: false });
      window.addEventListener("pointerup", handlePaletteDragUp, { passive: false });
      window.addEventListener("pointercancel", handlePaletteDragCancel, { passive: false });
      render();
    }

    function isOverStageClient(ev) {
      const r = stage.getBoundingClientRect();
      return ev.clientX >= r.left && ev.clientX <= r.right && ev.clientY >= r.top && ev.clientY <= r.bottom;
    }

    function updateDragPreview(ev) {
      if (!state.draggingPart) return;
      if (!state.dragPreviewEl) {
        const el = document.createElement("div");
        el.className = "drag-preview";
        document.body.appendChild(el);
        state.dragPreviewEl = el;
      }
      const part = state.draggingPart;
      state.dragPreviewEl.innerHTML = makeSvgMarkup(part, part.width, part.height, state.ghost || currentColors());
      state.dragPreviewEl.style.left = ev.clientX + "px";
      state.dragPreviewEl.style.top = ev.clientY + "px";
      state.dragPreviewEl.style.transform = "translate(-50%,-50%) rotate(" + ((state.ghost && state.ghost.rotation) || 0) + "deg)";
    }

    function clearDragPreview() {
      unlockPageScroll();
      if (state.dragPreviewEl) {
        state.dragPreviewEl.remove();
        state.dragPreviewEl = null;
      }
    }

    function updatePaletteDrag(ev) {
      if (!state.ghost || !state.draggingPart) return;
      updateDragPreview(ev);
      if (isOverStageClient(ev)) {
        state.ghost.visible = true;
        updateGhost(screenToWorld(ev));
      } else {
        state.ghost.visible = false;
        state.ghost.snapCandidate = null;
      }
    }

    function handlePaletteDragMove(ev) {
      if (!state.paletteDrag) return;
      ev.preventDefault();
      updatePaletteDrag(ev);
      render();
    }

    function cleanupPaletteDragListeners() {
      window.removeEventListener("pointermove", handlePaletteDragMove);
      window.removeEventListener("pointerup", handlePaletteDragUp);
      window.removeEventListener("pointercancel", handlePaletteDragCancel);
    }

    function cleanupConnectionsAfterTransform(selectedIds) {
      state.connections = state.connections.filter(c => {
        const aSelected = selectedIds.has(c.a.instanceId);
        const bSelected = selectedIds.has(c.b.instanceId);

        // Connections that are not affected by the transformed selection stay untouched.
        if (!aSelected && !bSelected) return true;

        // Connections inside the transformed selection stay valid as a group relation.
        if (aSelected && bSelected) return true;

        const instA = state.placed.find(i => i.id === c.a.instanceId);
        const instB = state.placed.find(i => i.id === c.b.instanceId);
        if (!instA || !instB) return false;

        const a = worldSnapPoints(instA).find(sp => sp.snapId === c.a.snapId);
        const b = worldSnapPoints(instB).find(sp => sp.snapId === c.b.snapId);
        if (!a || !b) return false;

        const dist = Math.hypot(a.x - b.x, a.y - b.y);
        return dist <= 1 && oppositeDirections(a.direction, b.direction);
      });
    }

    function getSelectionIds() {
      return new Set(state.moveExisting ? state.moveExisting.ids : state.selection);
    }

    function getInstancesByIds(ids) {
      return state.placed.filter(inst => ids.has(inst.id));
    }

    function getInstancesBounds(instances) {
      return instances.reduce((bounds, inst) => {
        const b = instanceBounds(inst);
        if (!bounds) return { ...b };
        bounds.x1 = Math.min(bounds.x1, b.x1);
        bounds.y1 = Math.min(bounds.y1, b.y1);
        bounds.x2 = Math.max(bounds.x2, b.x2);
        bounds.y2 = Math.max(bounds.y2, b.y2);
        return bounds;
      }, null);
    }

    function getInstancesCenter(instances) {
      const b = getInstancesBounds(instances);
      return b
        ? { x: (b.x1 + b.x2) / 2, y: (b.y1 + b.y2) / 2 }
        : { x: 0, y: 0 };
    }

    function rotateInstanceRotation(inst, step) {
      inst.rotation = inst.mirrored
        ? (inst.rotation - step + 360) % 360
        : (inst.rotation + step + 360) % 360;
    }

    function rotateInstances(instances, step) {
      if (instances.length > 1) {
        const center = getInstancesCenter(instances);
        const rad = step * Math.PI / 180;
        const cos = Math.cos(rad);
        const sin = Math.sin(rad);

        instances.forEach(inst => {
          const dx = inst.x - center.x;
          const dy = inst.y - center.y;
          inst.x = center.x + dx * cos - dy * sin;
          inst.y = center.y + dx * sin + dy * cos;
          rotateInstanceRotation(inst, step);
        });
      } else {
        instances.forEach(inst => rotateInstanceRotation(inst, step));
      }
    }

    function mirrorInstances(instances) {
      const center = getInstancesCenter(instances);
      instances.forEach(inst => {
        inst.x = center.x - (inst.x - center.x);
        inst.mirrored = !inst.mirrored;
      });
    }

    function rebaseMoveExisting(instances) {
      if (!state.moveExisting) return;

      if (state.pointer) {
        state.moveExisting.startPointer = { x: state.pointer.x, y: state.pointer.y };
      }

      state.moveExisting.starts = instances.map(inst => ({
        id: inst.id,
        x: inst.x,
        y: inst.y
      }));

      state.moveExisting.snapCandidate = null;
    }

    function finishTransform(selectedIds, selected, options = {}) {
      const { duringMove = false, autoConnect = true } = options;

      cleanupConnectionsAfterTransform(selectedIds);
      if (autoConnect) autoConnectAllTouchingSnaps(selectedIds);

      if (duringMove) {
        rebaseMoveExisting(selected);
        state.moveExisting.connectionsCleared = false;
      }
    }

    function handlePaletteDragUp(ev) {
      if (!state.paletteDrag) return;
      ev.preventDefault();
      updatePaletteDrag(ev);
      if (isOverStageClient(ev)) {
        placeGhost();
      } else {
        cancelPlacing();
      }
      cleanupPaletteDragListeners();
      unlockPageScroll();
    }

    function handlePaletteDragCancel(ev) {
      if (!state.paletteDrag) return;
      ev.preventDefault();
      cancelPlacing();
      cleanupPaletteDragListeners();
      unlockPageScroll();
    }

    function cancelPlacing() {
      unlockPageScroll();
      state.mode = "idle";
      state.paletteDrag = false;
      state.draggingPart = null;
      state.ghost = null;
      clearDragPreview();
      render();
    }

    function mirrorSelected() {
      if (!state.selection || state.selection.size === 0) return;

      const selectedIds = getSelectionIds();
      const selected = getInstancesByIds(selectedIds);
      if (!selected.length) return;

      const duringMove = !!state.moveExisting;
      if (!duringMove) saveState();
      else if (!state.moveExisting.historySaved) {
        saveState();
        state.moveExisting.historySaved = true;
      }

      mirrorInstances(selected);
      finishTransform(selectedIds, selected, { duringMove });
      render();
    }

    function duplicateSelected() {
      if (!state.selection || state.selection.size === 0) return;
      saveState();

      const ids = new Set(state.selection);
      const selected = state.placed.filter(inst => ids.has(inst.id));
      if (selected.length === 0) return;

      const idMap = new Map();
      const newIds = [];

      for (const inst of selected) {
        const newId = "i" + state.nextId++;
        idMap.set(inst.id, newId);
        newIds.push(newId);
        state.placed.push({
          ...JSON.parse(JSON.stringify(inst)),
          id: newId,
          x: inst.x + 50,
          y: inst.y + 50
        });
      }

      for (const c of state.connections) {
        if (idMap.has(c.a.instanceId) && idMap.has(c.b.instanceId)) {
          state.connections.push({
            a: { instanceId: idMap.get(c.a.instanceId), snapId: c.a.snapId },
            b: { instanceId: idMap.get(c.b.instanceId), snapId: c.b.snapId }
          });
        }
      }

      state.selection = new Set(newIds);
      render();
    }

    function rotateActive(stepOverride) {
      if (state.mode === "placing" && state.ghost) {
        const step = stepOverride ?? (state.draggingPart.rotationStep || 90);
        state.ghost.rotation = (state.ghost.rotation + step + 360) % 360;
        if (state.paletteDrag && state.dragPreviewEl) {
          state.dragPreviewEl.style.transform = `translate(-50%,-50%) scale(${state.ghost.mirrored ? -1 : 1}, 1) rotate(${state.ghost.rotation || 0}deg)`;
        }
        if (state.ghost.visible) updateGhost(state.pointer);
        render();
        return;
      }

      if (!state.selection || state.selection.size === 0) return;

      const selectedIds = getSelectionIds();
      const selected = getInstancesByIds(selectedIds);
      if (!selected.length) return;

      const duringMove = !!state.moveExisting;
      const part = selected.length === 1 ? getPart(selected[0].partId) : null;
      const step = stepOverride ?? (part?.rotationStep || 90);

      if (!duringMove) saveState();
      else if (!state.moveExisting.historySaved) {
        saveState();
        state.moveExisting.historySaved = true;
      }

      rotateInstances(selected, step);
      finishTransform(selectedIds, selected, { duringMove });
      render();
    }



    function setSelectionTool(enabled) {
      state.tool = enabled ? "select" : "edit";
      state.selectBox = null;
      const btn = $("#selectModeBtn");
      if (btn) {
        btn.classList.toggle("tool-active", state.tool === "select");
        btn.textContent = state.tool === "select" ? "Auswahl: AN" : "Auswahl";
      }
      render();
    }

    function pointerDistance(a, b) { return Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY); }
    function pointerMidpoint(a, b) { return { clientX: (a.clientX + b.clientX) / 2, clientY: (a.clientY + b.clientY) / 2 }; }

    function resetPointerState() {
      state.activePointers.clear();
      state.pinch = null;
      state.isMultiTouch = false;
      state.panning = false;
      state.panStart = null;
      state.selectBox = null;
      state.moveExisting = null;

      window.removeEventListener("pointermove", handleExistingMoveWindow);
      window.removeEventListener("pointerup", handleExistingUpWindow);
      window.removeEventListener("pointercancel", handleExistingUpWindow);

      document.body.classList.remove("drop-delete-active");
      render();
    }

    function beginPinchIfNeeded() {
      if (state.activePointers.size < 2) return;
      const pts = [...state.activePointers.values()].slice(0, 2);
      const mid = pointerMidpoint(pts[0], pts[1]);
      state.pinch = {
        lastDist: Math.max(10, pointerDistance(pts[0], pts[1])),
        lastMid: mid
      };
      state.selectBox = null;
      state.moveExisting = null;
    }

    function updatePinch() {
      if (!state.pinch || state.activePointers.size < 2) return false;

      const pts = [...state.activePointers.values()].slice(0, 2);
      const mid = pointerMidpoint(pts[0], pts[1]);
      const dist = Math.max(10, pointerDistance(pts[0], pts[1]));

      const before = screenToWorld(mid);

      const zoomRatio = dist / state.pinch.lastDist;
      state.zoom = Math.min(3, Math.max(0.35, state.zoom * zoomRatio));

      render();

      const after = screenToWorld(mid);

      state.pan.x += (after.x - before.x) * state.zoom;
      state.pan.y += (after.y - before.y) * state.zoom;

      state.pan.x += mid.clientX - state.pinch.lastMid.clientX;
      state.pan.y += mid.clientY - state.pinch.lastMid.clientY;

      state.pinch.lastDist = dist;
      state.pinch.lastMid = mid;

      render();
      return true;
    }

    function updateGhost(pointerWorld) {
      if (!state.ghost) return;
      state.pointer = pointerWorld;
      let x = pointerWorld.x, y = pointerWorld.y;
      const candidate = findSnapCandidate(state.draggingPart, x, y, state.ghost.rotation, new Set(), new Set(), false)

      if (candidate) {
        x = candidate.x;
        y = candidate.y;
        state.ghost.snapCandidate = candidate;
      } else {
        state.ghost.snapCandidate = null;
        if ($("#gridToggle").checked) {
          x = snapGrid(x);
          y = snapGrid(y);
        }
      }
      state.ghost.x = x;
      state.ghost.y = y;
    }

    function findSnapCandidate(part, x, y, rotation, excludeIds = new Set(), ignoreIds = new Set(), mirrored = false) {
      let best = null;
      const open = allOpenSnapPoints(excludeIds, ignoreIds);

      for (const local of part.snapPoints) {
        const rp = transformPoint(local, rotation, mirrored);

        const localWorld = {
          x: x + rp.x,
          y: y + rp.y,
          direction: transformDirection(local.direction, rotation, mirrored),
          snapId: local.id
        };

        for (const target of open) {
          if (!oppositeDirections(localWorld.direction, target.direction)) continue;

          const dx = target.x - localWorld.x;
          const dy = target.y - localWorld.y;
          const dist = Math.hypot(dx, dy);

          if (dist <= CONFIG.snapDistance && (!best || dist < best.dist)) {
            best = {
              dist,
              x: x + dx,
              y: y + dy,
              localSnapId: local.id,
              target
            };
          }
        }
      }

      return best;
    }

    function placeGhost() {
      saveState();
      if (!state.ghost || !state.draggingPart || !state.ghost.visible) {
        cancelPlacing();
        return;
      }
      const instance = {
        id: "i" + state.nextId++,
        partId: state.draggingPart.id,
        x: state.ghost.x,
        y: state.ghost.y,
        rotation: state.ghost.rotation,
        mainColor: state.ghost.mainColor || state.mainColor,
        hookColor: state.ghost.hookColor || state.hookColor
      };
      state.placed.push(instance);
      state.selection.clear();
      state.selection.add(instance.id);

      autoConnectAllTouchingSnaps(new Set([instance.id]));

      state.mode = "idle";
      state.paletteDrag = false;
      state.draggingPart = null;
      state.ghost = null;
      clearDragPreview();
      render();
    }

    function render() {
      viewport.setAttribute("transform", `translate(${state.pan.x} ${state.pan.y}) scale(${state.zoom})`);
      renderConnections();
      renderShapes();
      renderSnaps();
      renderGhost();
      renderSelectionBox();
      updateSidebar();
      updateCanvasActions();
      updateSelectionSizeInfo();
    }

    function createPaletteUI(container, onPick, onCustom) {
      container.innerHTML = "";

      COLOR_PALETTES.forEach(palette => {
        const label = document.createElement("div");
        label.textContent = palette.name;
        label.className = "palette-label";
        container.appendChild(label);

        const row = document.createElement("div");
        row.className = "palette-row";

        palette.colors.forEach(color => {
          const swatch = document.createElement("div");
          swatch.className = "palette-color";
          swatch.style.background = color;

          swatch.addEventListener("click", ev => {
            ev.stopPropagation();
            onPick(color);
            container.classList.add("hidden");
          });

          row.appendChild(swatch);
        });

        container.appendChild(row);
      });

      const customBtn = document.createElement("button");
      customBtn.type = "button";
      customBtn.className = "palette-custom-btn";
      customBtn.textContent = "Custom Color";
      customBtn.addEventListener("pointerdown", ev => {
        ev.preventDefault();
        ev.stopPropagation();
        ev.stopImmediatePropagation();
        onCustom();
      });

      customBtn.addEventListener("click", ev => {
        ev.preventDefault();
        ev.stopPropagation();
        ev.stopImmediatePropagation();
      });

      container.appendChild(customBtn);
    }


    function renderShapes() {
      shapesLayer.innerHTML = "";

      let selectedBounds = null;

      for (const inst of state.placed) {
        const part = getPart(inst.partId);
        const g = document.createElementNS(svgNS, "g");

        g.setAttribute("class", "placed-shape" + (state.selection.has(inst.id) ? " selected" : ""));
        g.setAttribute("data-id", inst.id);
        g.setAttribute("transform", `translate(${inst.x} ${inst.y}) scale(${inst.mirrored ? -1 : 1} 1) rotate(${inst.rotation})`);

        g.appendChild(createNestedSvg(part, {
          mainColor: inst.mainColor || "#a45858",
          hookColor: inst.hookColor || "#5b3434"
        }));

        const outline = document.createElementNS(svgNS, "rect");
        outline.setAttribute("class", "shape-outline");
        outline.setAttribute("x", -part.width / 2);
        outline.setAttribute("y", -part.height / 2);
        outline.setAttribute("width", part.width);
        outline.setAttribute("height", part.height);
        outline.setAttribute("rx", 6);
        g.appendChild(outline);

        g.addEventListener("pointerdown", ev => {
          if (ev.pointerType === "touch" && state.activePointers.size >= 2) return;
          if (ev.button !== 0) return;

          ev.preventDefault();
          ev.stopPropagation();

          if (state.mode === "placing") return;

          const multiSelect = isMultiSelectEvent(ev);

          if (state.tool === "select") {
            if (multiSelect) {
              if (state.selection.has(inst.id)) {
                state.selection.delete(inst.id);
              } else {
                state.selection.add(inst.id);
              }
            } else {
              state.selection.clear();
              state.selection.add(inst.id);
            }

            render();
            return;
          }

          if (multiSelect) {
            if (state.selection.has(inst.id)) {
              state.selection.delete(inst.id);
            } else {
              state.selection.add(inst.id);
            }

            render();
            return;
          }

          if (!state.selection.has(inst.id)) {
            state.selection.clear();
            state.selection.add(inst.id);
          }

          const pointer = screenToWorld(ev);
          state.pointer = pointer;
          const ids = new Set(state.selection);

          state.moveExisting = {
            ids,
            startPointer: pointer,
            starts: state.placed
              .filter(i => ids.has(i.id))
              .map(i => ({ id: i.id, x: i.x, y: i.y })),
            snapCandidate: null,
            moved: false,
            historySaved: false
          };

          window.addEventListener("pointermove", handleExistingMoveWindow, { passive: false });
          window.addEventListener("pointerup", handleExistingUpWindow, { passive: false });
          window.addEventListener("pointercancel", handleExistingUpWindow, { passive: false });

          render();
        });

        shapesLayer.appendChild(g);

        if (state.selection.has(inst.id)) {
          const b = instanceBounds(inst);

          if (!selectedBounds) {
            selectedBounds = { ...b };
          } else {
            selectedBounds.x1 = Math.min(selectedBounds.x1, b.x1);
            selectedBounds.y1 = Math.min(selectedBounds.y1, b.y1);
            selectedBounds.x2 = Math.max(selectedBounds.x2, b.x2);
            selectedBounds.y2 = Math.max(selectedBounds.y2, b.y2);
          }
        }
      }

      // Rotate-Buttons erst nach allen Shapes rendern = immer oberste Ebene
      if (selectedBounds) {
        const b = selectedBounds;
        const centerX = (b.x1 + b.x2) / 2;
        const btnY = b.y1 - 24;

        const rotateX = centerX - 16;
        const duplicateX = centerX + 16;


        const rotateBtn = document.createElementNS(svgNS, "g");
        rotateBtn.setAttribute("class", "rotate-handle");
        rotateBtn.setAttribute("transform", `translate(${rotateX} ${btnY})`);
        rotateBtn.style.cursor = "pointer";

        const circle = document.createElementNS(svgNS, "circle");
        circle.setAttribute("r", 13);
        circle.setAttribute("fill", "white");
        circle.setAttribute("stroke", "#4b7bec");
        circle.setAttribute("stroke-width", "2");

        const text = document.createElementNS(svgNS, "text");
        text.setAttribute("x", "0");
        text.setAttribute("y", "5");
        text.setAttribute("text-anchor", "middle");
        text.setAttribute("font-size", "14");
        text.setAttribute("font-weight", "700");
        text.setAttribute("fill", "#4b7bec");
        text.textContent = "↻";

        rotateBtn.appendChild(circle);
        rotateBtn.appendChild(text);

        rotateBtn.addEventListener("pointerdown", ev => {
          if (ev.button !== 0) return; // 👈 nur Linksklick

          ev.preventDefault();
          ev.stopPropagation();
          rotateActive();
        });

        shapesLayer.appendChild(rotateBtn);

        const duplicateBtn = document.createElementNS(svgNS, "g");
        duplicateBtn.setAttribute("class", "duplicate-handle");
        duplicateBtn.setAttribute("transform", `translate(${duplicateX} ${btnY})`);
        duplicateBtn.style.cursor = "pointer";

        const dCircle = document.createElementNS(svgNS, "circle");
        dCircle.setAttribute("r", 13);
        dCircle.setAttribute("fill", "white");
        dCircle.setAttribute("stroke", "#3ba76d");
        dCircle.setAttribute("stroke-width", "2");

        const dIcon = document.createElementNS(svgNS, "g");

        // hinteres Rechteck
        const r1 = document.createElementNS(svgNS, "rect");
        r1.setAttribute("x", "-6");
        r1.setAttribute("y", "-6");
        r1.setAttribute("width", "10");
        r1.setAttribute("height", "10");
        r1.setAttribute("rx", "2");
        r1.setAttribute("fill", "none");
        r1.setAttribute("stroke", "#3ba76d");
        r1.setAttribute("stroke-width", "1.5");

        // vorderes Rechteck (leicht versetzt)
        const r2 = document.createElementNS(svgNS, "rect");
        r2.setAttribute("x", "-3");
        r2.setAttribute("y", "-3");
        r2.setAttribute("width", "10");
        r2.setAttribute("height", "10");
        r2.setAttribute("rx", "2");
        r2.setAttribute("fill", "white"); // 👈 wichtig
        r2.setAttribute("stroke", "#3ba76d");
        r2.setAttribute("stroke-width", "1.5");

        dIcon.appendChild(r1);
        dIcon.appendChild(r2);

        duplicateBtn.appendChild(dCircle);
        duplicateBtn.appendChild(dIcon);

        duplicateBtn.addEventListener("pointerdown", ev => {
          if (ev.button !== 0) return; // 👈 nur Linksklick

          ev.preventDefault();
          ev.stopPropagation();
          duplicateSelected();
        });

        shapesLayer.appendChild(duplicateBtn);
      }
    }

    function isMultiSelectEvent(ev) {
      return ev.ctrlKey || ev.metaKey || ev.shiftKey;
    }

    function renderSnaps() {
      snapLayer.innerHTML = "";
      const placingVisible = state.mode === "placing" && state.ghost && state.ghost.visible;
      const shouldShow = placingVisible || state.selection.size > 0;
      if (!shouldShow) return;

      for (const sp of allOpenSnapPoints()) {
        drawSnap(sp.x, sp.y, "snap-open");
      }

      if (placingVisible) {
        const part = state.draggingPart;
        for (const local of part.snapPoints) {
          const rp = rotatePoint(local, state.ghost.rotation);
          drawSnap(state.ghost.x + rp.x, state.ghost.y + rp.y, state.ghost.snapCandidate ? "snap-valid" : "snap-active");
        }
      }
    }

    function renderGhost() {
      ghostLayer.innerHTML = "";
      if (!state.ghost || !state.draggingPart || !state.ghost.visible) return;
      const part = state.draggingPart;
      const g = document.createElementNS(svgNS, "g");
      g.setAttribute("class", "ghost" + (state.ghost.snapCandidate ? " valid" : ""));
      g.setAttribute("transform", `translate(${state.ghost.x} ${state.ghost.y}) rotate(${state.ghost.rotation})`);
      g.appendChild(createNestedSvg(part, state.ghost));
      ghostLayer.appendChild(g);
    }


    function renderSelectionBox() {
      selectionLayer.innerHTML = "";
      if (!state.selectBox) return;
      const x = Math.min(state.selectBox.start.x, state.selectBox.current.x);
      const y = Math.min(state.selectBox.start.y, state.selectBox.current.y);
      const w = Math.abs(state.selectBox.current.x - state.selectBox.start.x);
      const h = Math.abs(state.selectBox.current.y - state.selectBox.start.y);
      const r = document.createElementNS(svgNS, "rect");
      r.setAttribute("class", "selection-rect");
      r.setAttribute("x", x);
      r.setAttribute("y", y);
      r.setAttribute("width", w);
      r.setAttribute("height", h);
      selectionLayer.appendChild(r);
    }

    function instanceBounds(inst) {
      const part = getPart(inst.partId);
      const odd = Math.abs(inst.rotation % 180) === 90;
      const w = odd ? part.height : part.width;
      const h = odd ? part.width : part.height;
      return { x1: inst.x - w / 2, y1: inst.y - h / 2, x2: inst.x + w / 2, y2: inst.y + h / 2 };
    }

    function rectsIntersect(a, b) {
      return a.x1 <= b.x2 && a.x2 >= b.x1 && a.y1 <= b.y2 && a.y2 >= b.y1;
    }

    function selectByBox(box) {
      const x1 = Math.min(box.start.x, box.current.x);
      const y1 = Math.min(box.start.y, box.current.y);
      const x2 = Math.max(box.start.x, box.current.x);
      const y2 = Math.max(box.start.y, box.current.y);
      const w = x2 - x1;
      const h = y2 - y1;
      state.selection.clear();
      if (w < 4 && h < 4) return;
      const rect = { x1, y1, x2, y2 };
      for (const inst of state.placed) {
        if (rectsIntersect(rect, instanceBounds(inst))) {
          state.selection.add(inst.id);
        }
      }
    }

    function clearConnectionsForMovedIds(ids) {
      // Sobald ein Teil bewegt wird, gelten seine alten externen Snap-Verbindungen nicht mehr.
      // Interne Verbindungen innerhalb einer gemeinsam verschobenen Auswahl bleiben erhalten.
      state.connections = state.connections.filter(c => {
        const aMoved = ids.has(c.a.instanceId);
        const bMoved = ids.has(c.b.instanceId);
        if (aMoved && bMoved) return true;
        return !aMoved && !bMoved;
      });
    }

    function findGroupSnapCandidate(ids) {
      const selectedSnaps = state.placed
        .filter(inst => ids.has(inst.id))
        .flatMap(inst => worldSnapPoints(inst))
        .filter(sp => !isSnapOccupied(sp.instanceId, sp.snapId, ids));

      const openTargets = allOpenSnapPoints(ids, ids);

      let best = null;

      for (const local of selectedSnaps) {
        for (const target of openTargets) {
          if (!oppositeDirections(local.direction, target.direction)) continue;

          const dx = target.x - local.x;
          const dy = target.y - local.y;
          const dist = Math.hypot(dx, dy);

          if (dist <= CONFIG.snapDistance && (!best || dist < best.dist)) {
            best = {
              dist,
              dx,
              dy,
              local,
              target
            };
          }
        }
      }

      return best;
    }

    function moveSelected(pointerWorld) {
      if (!state.moveExisting) return;
      state.pointer = pointerWorld;

      const dx = pointerWorld.x - state.moveExisting.startPointer.x;
      const dy = pointerWorld.y - state.moveExisting.startPointer.y;
      const hasMoved = Math.abs(dx) > 2 || Math.abs(dy) > 2;

      if (hasMoved && !state.moveExisting.historySaved) {
        saveState();
        state.moveExisting.historySaved = true;
      }
      if (hasMoved && !state.moveExisting.connectionsCleared) {
        clearConnectionsForMovedIds(state.moveExisting.ids);
        state.moveExisting.connectionsCleared = true;
      }
      state.moveExisting.moved = hasMoved;

      for (const start of state.moveExisting.starts) {
        const inst = state.placed.find(i => i.id === start.id);
        if (!inst) continue;
        inst.x = start.x + dx;
        inst.y = start.y + dy;
      }

      state.moveExisting.snapCandidate = null;

      if (state.moveExisting.ids.size === 1) {
        const id = [...state.moveExisting.ids][0];
        const inst = state.placed.find(i => i.id === id);
        if (!inst) return;

        const part = getPart(inst.partId);
        const candidate = findSnapCandidate(part, inst.x, inst.y, inst.rotation, new Set([id]), new Set([id]), inst.mirrored);

        if (candidate) {
          inst.x = candidate.x;
          inst.y = candidate.y;
          state.moveExisting.snapCandidate = candidate;
        } else if ($("#gridToggle").checked) {
          inst.x = snapGrid(inst.x);
          inst.y = snapGrid(inst.y);
        }

        return;
      }

      const groupCandidate = findGroupSnapCandidate(state.moveExisting.ids);
      if (groupCandidate) {
        for (const start of state.moveExisting.starts) {
          const inst = state.placed.find(i => i.id === start.id);
          if (!inst) continue;
          inst.x += groupCandidate.dx;
          inst.y += groupCandidate.dy;
        }
        state.moveExisting.snapCandidate = groupCandidate;
        return;
      }

      if ($("#gridToggle").checked) {
        const first = state.moveExisting.starts[0];
        const firstInst = first && state.placed.find(i => i.id === first.id);
        if (!firstInst) return;

        const gx = snapGrid(first.x + dx) - (first.x + dx);
        const gy = snapGrid(first.y + dy) - (first.y + dy);

        for (const start of state.moveExisting.starts) {
          const inst = state.placed.find(i => i.id === start.id);
          if (!inst) continue;
          inst.x = start.x + dx + gx;
          inst.y = start.y + dy + gy;
        }
      }
    }

    function connectionExists(aInstanceId, aSnapId, bInstanceId, bSnapId) {
      return state.connections.some(c =>
        (c.a.instanceId === aInstanceId && c.a.snapId === aSnapId && c.b.instanceId === bInstanceId && c.b.snapId === bSnapId) ||
        (c.a.instanceId === bInstanceId && c.a.snapId === bSnapId && c.b.instanceId === aInstanceId && c.b.snapId === aSnapId)
      );
    }

    function addConnection(aInstanceId, aSnapId, target) {
      if (!target) return;
      if (connectionExists(aInstanceId, aSnapId, target.instanceId, target.snapId)) return;
      state.connections.push({
        a: { instanceId: aInstanceId, snapId: aSnapId },
        b: { instanceId: target.instanceId, snapId: target.snapId }
      });
    }

    function autoConnectAllTouchingSnaps(ids) {
      const movedSnaps = state.placed
        .filter(inst => ids.has(inst.id))
        .flatMap(inst => worldSnapPoints(inst))
        .filter(sp => !isSnapOccupied(sp.instanceId, sp.snapId));

      const targets = allOpenSnapPoints(ids, ids);

      for (const local of movedSnaps) {
        if (isSnapOccupied(local.instanceId, local.snapId)) continue;

        let best = null;

        for (const target of targets) {
          if (ids.has(target.instanceId)) continue;
          if (isSnapOccupied(target.instanceId, target.snapId)) continue;
          if (!oppositeDirections(local.direction, target.direction)) continue;

          const dist = Math.hypot(target.x - local.x, target.y - local.y);

          if (dist <= CONFIG.snapDistance && (!best || dist < best.dist)) {
            best = { dist, target };
          }
        }

        if (best) {
          addConnection(local.instanceId, local.snapId, best.target);
        }
      }
    }

    function finishMoveSelected() {
      if (!state.moveExisting) return;
      const ids = state.moveExisting.ids;

      if (state.moveExisting.moved) {
        autoConnectAllTouchingSnaps(ids);
      }

      state.moveExisting = null;
    }

    function drawSnap(x, y, cls) {
      const c = document.createElementNS(svgNS, "circle");
      c.setAttribute("class", `snap-point ${cls}`);
      c.setAttribute("cx", x);
      c.setAttribute("cy", y);
      c.setAttribute("r", 5);
      snapLayer.appendChild(c);
    }

    function renderConnections() {
      connectionsLayer.innerHTML = "";
      for (const conn of state.connections) {
        const aInst = state.placed.find(i => i.id === conn.a.instanceId);
        const bInst = state.placed.find(i => i.id === conn.b.instanceId);
        if (!aInst || !bInst) continue;
        const a = worldSnapPoints(aInst).find(s => s.snapId === conn.a.snapId);
        const b = worldSnapPoints(bInst).find(s => s.snapId === conn.b.snapId);
        if (!a || !b) continue;
        const line = document.createElementNS(svgNS, "line");
        line.setAttribute("class", "connection-line");
        line.setAttribute("x1", a.x); line.setAttribute("y1", a.y);
        line.setAttribute("x2", b.x); line.setAttribute("y2", b.y);
        connectionsLayer.appendChild(line);
      }
    }


    function updateCanvasActions() {
      const actions = $("#canvasActions");
      if (!actions) return;

      const hasSelection = state.selection && state.selection.size > 0;
      actions.classList.toggle("visible", hasSelection);

      if (!hasSelection) {
        closeAllColorDropdowns();
        return;
      }

      const firstId = [...state.selection][0];
      const first = state.placed.find(p => p.id === firstId);
      if (!first) return;

      const mainColor = first.mainColor || "#a45858";
      const hookColor = first.hookColor || "#5b3434";

      const mainPicker = $("#selectedMainColorPicker");
      const hookPicker = $("#selectedHookColorPicker");
      const mainPreview = $("#mainColorPreview");
      const hookPreview = $("#hookColorPreview");

      if (mainPicker) mainPicker.value = mainColor;
      if (hookPicker) hookPicker.value = hookColor;
      if (mainPreview) mainPreview.style.background = mainColor;
      if (hookPreview) hookPreview.style.background = hookColor;
    }

    function updateSidebar() {
      $("#partCount").textContent = state.placed.length;
      $("#selectionCount").textContent = state.selection.size;
      $("#connectionCount").textContent = state.connections.length;
      $("#bom").innerHTML = makeBomText();
    }

    function makeBomText() {
      if (!state.mountConfig) {
        return "Please select a wall mount option first.";
      }

      if (state.placed.length === 0) {
        return "No parts placed yet.";
      }

      const hookParts = {};
      const connectorParts = {};
      const endParts = {};

      let hookPartCount = 0;

      for (const inst of state.placed) {
        const part = getPart(inst.partId);

        if (part.category === "hook") {
          hookParts[part.name] = (hookParts[part.name] || 0) + 1;
          hookPartCount++;
        } else if (part.category === "connector") {
          connectorParts[part.name] = (connectorParts[part.name] || 0) + 1;
        } else if (part.category === "end") {
          endParts[part.name] = (endParts[part.name] || 0) + 1;
        }
      }

      const lines = [];

      // ---- PARTS ----


      if (Object.keys(hookParts).length) {
        lines.push("<strong>Hook Parts:</strong>");
        for (const [name, count] of Object.entries(hookParts)) {
          lines.push(`  ${count}x ${name}`);
        }
      }

      if (Object.keys(connectorParts).length) {
        lines.push("");
        lines.push("<strong>Connector Parts:</strong>");
        for (const [name, count] of Object.entries(connectorParts)) {
          lines.push(`  ${count}x ${name}`);
        }
      }

      if (Object.keys(endParts).length) {
        lines.push("");
        lines.push("<strong>End Parts:</strong>");
        for (const [name, count] of Object.entries(endParts)) {
          lines.push(`  ${count}x ${name}`);
        }
      }

      // ---- WALL MOUNTS ----
      if (hookPartCount > 0) {
        lines.push("");
        lines.push("<strong>Wall Mounts:</strong>");

        if (state.mountConfig === "countersunk") {
          lines.push(`${hookPartCount}x Wall Mount – Countersunk`);
        } else if (state.mountConfig === "roundhead") {
          lines.push(`${hookPartCount}x Wall Mount – Round Head`);
        } else if (state.mountConfig === "tape") {
          lines.push(`${hookPartCount}x Double-Sided Tape`);
        }
      }

      // ---- CONNECTION PIECES ----
      const openSnapCount = state.placed
        .flatMap(inst => worldSnapPoints(inst))
        .filter(sp => !isSnapOccupied(sp.instanceId, sp.snapId))
        .length;

      const fullConnectionPieces = state.connections.length;
      const halfConnectionPieces = openSnapCount;

      if (fullConnectionPieces > 0 || halfConnectionPieces > 0) {
        lines.push("");
        lines.push("<strong>Connection Pieces:</strong>");

        if (fullConnectionPieces > 0) {
          lines.push(`${fullConnectionPieces}x Full Connection Piece`);
        }

        if (halfConnectionPieces > 0) {
          lines.push(`${halfConnectionPieces}x Half Connection Piece`);
        }
      }

      return lines.join("<br>");
    }

    function deleteSelected() {
      if (state.selection.size === 0) return;
      saveState();
      const ids = new Set(state.selection);
      state.placed = state.placed.filter(i => !ids.has(i.id));
      state.connections = state.connections.filter(c => !ids.has(c.a.instanceId) && !ids.has(c.b.instanceId));
      state.selection.clear();
      render();
    }


    function isOverLeftPanelClient(ev) {
      const left = $("#leftbar");
      if (!left) return false;
      const r = left.getBoundingClientRect();
      return ev.clientX >= r.left && ev.clientX <= r.right && ev.clientY >= r.top && ev.clientY <= r.bottom;
    }

    function deleteMovedSelectionAfterDrop() {
      if (!state.moveExisting) return;
      const ids = new Set(state.moveExisting.ids);
      state.placed = state.placed.filter(i => !ids.has(i.id));
      state.connections = state.connections.filter(c => !ids.has(c.a.instanceId) && !ids.has(c.b.instanceId));
      state.selection.clear();
      state.moveExisting = null;
      document.body.classList.remove("drop-delete-active");
    }

    function handleExistingMoveWindow(ev) {
      if (state.paletteDrag) return;

      if (ev.pointerType === "touch") {
        state.activePointers.set(ev.pointerId, {
          clientX: ev.clientX,
          clientY: ev.clientY,
          pointerId: ev.pointerId
        });

        if (state.activePointers.size >= 2) {
          ev.preventDefault();

          state.isMultiTouch = true;
          state.moveExisting = null;
          state.selectBox = null;
          document.body.classList.remove("drop-delete-active");

          beginPinchIfNeeded();
          updatePinch();
          return;
        }
      }

      if (!state.moveExisting) return;
      ev.preventDefault();

      const p = screenToWorld(ev);
      moveSelected(p);

      if (state.moveExisting && state.moveExisting.moved && isOverLeftPanelClient(ev)) {
        document.body.classList.add("drop-delete-active");
      } else {
        document.body.classList.remove("drop-delete-active");
      }

      render();
    }

    function handleExistingUpWindow(ev) {
      if (!state.moveExisting) return;
      ev.preventDefault();
      const p = screenToWorld(ev);
      moveSelected(p);

      if (state.moveExisting && state.moveExisting.moved && isOverLeftPanelClient(ev)) {
        deleteMovedSelectionAfterDrop();
      } else {
        finishMoveSelected();
      }

      window.removeEventListener("pointermove", handleExistingMoveWindow);
      window.removeEventListener("pointerup", handleExistingUpWindow);
      window.removeEventListener("pointercancel", handleExistingUpWindow);
      state.activePointers.delete(ev.pointerId);
      if (state.activePointers.size < 2) state.pinch = null;
      state.panning = false;
      document.body.classList.remove("drop-delete-active");
      render();
    }


    stage.addEventListener("pointermove", ev => {
      if (state.paletteDrag) return;

      if (state.activePointers.has(ev.pointerId)) {
        state.activePointers.set(ev.pointerId, {
          clientX: ev.clientX,
          clientY: ev.clientY,
          pointerId: ev.pointerId
        });
      }

      if (updatePinch()) return;

      const p = screenToWorld(ev);
      state.pointer = p;

      if (state.mode === "placing") {
        updateGhost(p);
        render();

      } else if (state.selectBox) {
        state.selectBox.current = p;
        selectByBox(state.selectBox);
        render();

      } else if (state.panning && state.panStart) {
        state.pan.x = state.panStart.panX + (ev.clientX - state.panStart.clientX) * PAN_SENSITIVITY;
        state.pan.y = state.panStart.panY + (ev.clientY - state.panStart.clientY) * PAN_SENSITIVITY;
        render();

      } else if (state.moveExisting) {
        moveSelected(p);
        render();
      }
    });

    stage.addEventListener("pointerup", ev => {
      if (state.paletteDrag) return;

      const wasMultiTouch = state.isMultiTouch;

      state.activePointers.delete(ev.pointerId);

      if (state.activePointers.size < 2) {
        state.pinch = null;
        state.isMultiTouch = false;
      }

      if (wasMultiTouch) {
        state.panning = false;
        return;
      }

      if (state.mode === "placing") {
        const p = screenToWorld(ev);
        updateGhost(p);
        placeGhost();
      } else if (state.moveExisting) {
        finishMoveSelected();
        render();
      } else if (state.selectBox) {
        selectByBox(state.selectBox);
        state.selectBox = null;
        render();
      }

      state.panning = false;
    });

    stage.addEventListener("pointercancel", ev => {
      state.activePointers.delete(ev.pointerId);
      if (state.activePointers.size < 2) state.pinch = null;
      state.panning = false;
    });

    stage.addEventListener("pointerdown", ev => {
      if (state.activePointers.size > 0 && ev.pointerType === "touch") {
        // Falls iPad einen alten Finger hängen gelassen hat:
        state.activePointers.clear();
        state.pinch = null;
        state.isMultiTouch = false;
      }

      if (state.paletteDrag) return;
      if (ev.pointerType !== "touch") return;

      state.activePointers.set(ev.pointerId, {
        clientX: ev.clientX,
        clientY: ev.clientY,
        pointerId: ev.pointerId
      });

      // WICHTIG: Bei nur 1 Finger NICHTS blockieren
      if (state.activePointers.size < 2) return;

      ev.preventDefault();
      ev.stopPropagation();

      state.isMultiTouch = true;
      state.moveExisting = null;
      state.selectBox = null;
      state.panning = false;
      state.panStart = null;

      window.removeEventListener("pointermove", handleExistingMoveWindow);
      window.removeEventListener("pointerup", handleExistingUpWindow);
      window.removeEventListener("pointercancel", handleExistingUpWindow);

      document.body.classList.remove("drop-delete-active");

      beginPinchIfNeeded();
    }, { capture: true, passive: false });

    stage.addEventListener("pointerdown", ev => {
      if (state.paletteDrag) return;
      state.activePointers.set(ev.pointerId, { clientX: ev.clientX, clientY: ev.clientY, pointerId: ev.pointerId });

      if (ev.pointerType === "touch" && state.activePointers.size >= 2) {
        state.isMultiTouch = true;
        state.moveExisting = null;
        state.selectBox = null;

        window.removeEventListener("pointermove", handleExistingMoveWindow);
        window.removeEventListener("pointerup", handleExistingUpWindow);
        window.removeEventListener("pointercancel", handleExistingUpWindow);

        beginPinchIfNeeded();
        return;
      }

      if (state.mode === "placing") return;
      const onCanvasBackground = ev.target === stage || ev.target.closest("#viewport") === viewport;
      if (!onCanvasBackground) return;

      if (ev.button === 1) {
        state.panning = true;
        state.panStart = { clientX: ev.clientX, clientY: ev.clientY, panX: state.pan.x, panY: state.pan.y };
        return;
      }

      if (ev.button === 0) {
        ev.preventDefault();
        const p = screenToWorld(ev);
        state.selectBox = { start: p, current: p };
        state.selection.clear();
        stage.setPointerCapture?.(ev.pointerId);
        render();
      }
    });

    stage.addEventListener("wheel", ev => {
      ev.preventDefault();
      const scale = ev.deltaY < 0 ? 1.08 : 0.92;
      const before = screenToWorld(ev);
      state.zoom = Math.min(3, Math.max(0.35, state.zoom * scale));
      render();
      const after = screenToWorld(ev);
      state.pan.x += (after.x - before.x) * state.zoom;
      state.pan.y += (after.y - before.y) * state.zoom;
      render();
    }, { passive: false });


    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }
    function choice(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }
    function rotatedSnapPoint(sp, rotation) {
      const rp = rotatePoint(sp, rotation);
      return {
        id: sp.id,
        x: rp.x,
        y: rp.y,
        direction: rotateDirection(sp.direction, rotation)
      };
    }
    function wouldOverlap(candidate) {
      // Hitbox/Overlap-Prüfung für Random deaktiviert.
      // Die Formen dürfen sich dadurch wieder frei überlagern/verschneiden,
      // was bei diesem geometrischen Flow-System oft besser aussieht.
      return false;
    }
    function getOpenSnapPointsForRandom() {
      return state.placed.flatMap(inst => {
        const part = getPart(inst.partId);
        return part.snapPoints.map(sp => {
          const rp = rotatePoint(sp, inst.rotation);
          return {
            instanceId: inst.id,
            snapId: sp.id,
            x: inst.x + rp.x,
            y: inst.y + rp.y,
            direction: rotateDirection(sp.direction, inst.rotation)
          };
        }).filter(sp => !isSnapOccupied(sp.instanceId, sp.snapId));
      });
    }
    function findPlacementForPartAtSnap(part, targetSnap) {
      // Aggressiv testen: alle Snap-Punkte + alle Rotationen,
      // damit auch schwierigere Teile wie Dreieck, Quadrat, Endteil usw. eine Chance haben.
      const rotations = shuffle([0, 90, 180, 270]);
      const snapPoints = shuffle(part.snapPoints);

      for (const local of snapPoints) {
        for (const rotation of rotations) {
          const rsp = rotatedSnapPoint(local, rotation);
          if (!oppositeDirections(rsp.direction, targetSnap.direction)) continue;

          const candidate = {
            id: "i" + state.nextId,
            partId: part.id,
            x: targetSnap.x - rsp.x,
            y: targetSnap.y - rsp.y,
            rotation,
            mainColor: state.mainColor,
            hookColor: state.hookColor
          };

          if (!wouldOverlap(candidate)) {
            return {
              instance: candidate,
              localSnapId: local.id,
              target: targetSnap
            };
          }
        }
      }

      return null;
    }

    function weightedCandidateParts(targetCount) {
      const placedCount = Math.max(1, state.placed.length);
      const hookCount = state.placed.filter(inst => getPart(inst.partId).category === "hook").length;
      const hookRatio = hookCount / placedCount;
      const recentlyUsed = state.placed.slice(-3).map(p => p.partId);

      const weighted = [];
      for (const p of PARTS) {
        let weight = 1;

        // Connectoren sind gute Brücken, aber nicht nur Arc verwenden.
        if (p.category === "connector") weight += 2;

        // Haken sind wichtig, aber nicht zu viele direkt hintereinander.
        if (p.category === "hook" && hookRatio < 0.45) weight += 2;

        // Endteile eher spät, aber trotzdem möglich.
        if (p.category === "end") {
          weight += state.placed.length > targetCount * 0.65 ? 3 : 0;
        }

        // Schwierige/seltenere Formen bewusst pushen.
        if (
          p.id.includes("triangle") ||
          p.id.includes("square") ||
          p.id.includes("quarter") ||
          p.id.includes("halfcircle") ||
          p.id.includes("3quarter") ||
          p.id.includes("end")
        ) {
          weight += 3;
        }

        // Wiederholungen reduzieren, aber nicht komplett verbieten.
        if (recentlyUsed.includes(p.id)) weight -= 3;

        weight = Math.max(1, weight);
        for (let i = 0; i < weight; i++) weighted.push(p);
      }

      // Einmalige Reihenfolge mit Gewichtung.
      const picked = [];
      const seen = new Set();
      for (const p of shuffle(weighted)) {
        if (!seen.has(p.id)) {
          picked.push(p);
          seen.add(p.id);
        }
      }
      return picked;
    }

    function clearForRandom() {
      state.placed = [];
      state.connections = [];
      state.selection.clear();
      state.moveExisting = null;
      state.selectBox = null;
      state.mode = "idle";
      state.paletteDrag = false;
      state.draggingPart = null;
      state.ghost = null;
      clearDragPreview();
    }
    function generateRandomDesign() {
      saveState();
      clearForRandom();

      const hooks = PARTS.filter(p => p.category === "hook");
      const connectors = PARTS.filter(p => p.category === "connector");

      // Start nicht nur aus den leichtesten Formen: Hooks bevorzugen, aber gemischt.
      const startPool = [...hooks, ...connectors, ...connectors];
      const startPart = choice(startPool.length ? startPool : PARTS);

      const start = {
        id: "i" + state.nextId++,
        partId: startPart.id,
        x: 0,
        y: 0,
        rotation: choice([0, 90, 180, 270]),
        mainColor: state.mainColor,
        hookColor: state.hookColor
      };
      state.placed.push(start);

      const targetCount = randInt(7, 15);
      let globalAttempts = 0;

      while (state.placed.length < targetCount && globalAttempts < 500) {
        globalAttempts++;

        let openSnaps = getOpenSnapPointsForRandom();
        if (openSnaps.length === 0) break;

        // Nicht nur einen offenen Snap nehmen. Mehrere Snap-Punkte testen,
        // sonst bleibt der Generator an einem Dead-End hängen.
        openSnaps = shuffle(openSnaps).sort((a, b) => {
          // leichter Flow nach rechts/unten, aber mit Zufall
          const bias = (b.x + b.y * 0.25) - (a.x + a.y * 0.25);
          return Math.random() < 0.55 ? bias : Math.random() - 0.5;
        });

        let placed = false;
        const candidateParts = weightedCandidateParts(targetCount);

        for (const targetSnap of openSnaps) {
          for (const part of candidateParts) {
            const placement = findPlacementForPartAtSnap(part, targetSnap);
            if (!placement) continue;

            placement.instance.id = "i" + state.nextId++;
            state.placed.push(placement.instance);
            addConnection(placement.instance.id, placement.localSnapId, placement.target);
            placed = true;
            break;
          }
          if (placed) break;
        }

        // Wenn keine einzige Kombination passt, versuchen wir nicht kaputt weiterzubauen.
        // Stattdessen stoppen wir erst nach mehreren echten Fehlversuchen.
        if (!placed && globalAttempts > 80) break;
      }

      state.selection.clear();
      if (state.placed.length) {
        state.selection.add(state.placed[state.placed.length - 1].id);
      }
      render();
    }


    function serializeDesign() {
      return {
        name: "Flow Hook Design",
        version: 1,
        exportedAt: new Date().toISOString(),
        placed: state.placed,
        connections: state.connections,
        selection: Array.from(state.selection),
        pan: state.pan,
        zoom: state.zoom,
        nextId: state.nextId,
        mainColor: state.mainColor,
        hookColor: state.hookColor,
        mountConfig: state.mountConfig
      };
    }

    function loadDesignData(data) {
      if (!data || !Array.isArray(data.placed)) {
        alert("This file does not look like a valid Flow Hook design.");
        return;
      }

      saveState();

      state.placed = data.placed.map(p => ({
        id: String(p.id),
        partId: String(p.partId),
        x: Number(p.x) || 0,
        y: Number(p.y) || 0,
        rotation: Number(p.rotation) || 0,
        mirrored: !!p.mirrored,
        mainColor: p.mainColor || data.mainColor || "#a45858",
        hookColor: p.hookColor || data.hookColor || "#5b3434"
      })).filter(p => getPart(p.partId));

      const validIds = new Set(state.placed.map(p => p.id));
      state.connections = Array.isArray(data.connections)
        ? data.connections.filter(c =>
          c && c.a && c.b &&
          validIds.has(c.a.instanceId) &&
          validIds.has(c.b.instanceId)
        )
        : [];

      state.selection = new Set(
        Array.isArray(data.selection)
          ? data.selection.filter(id => validIds.has(id))
          : []
      );

      state.pan = data.pan && Number.isFinite(Number(data.pan.x)) && Number.isFinite(Number(data.pan.y))
        ? { x: Number(data.pan.x), y: Number(data.pan.y) }
        : { x: stage.clientWidth / 2, y: stage.clientHeight / 2 };

      state.zoom = Number.isFinite(Number(data.zoom)) ? Number(data.zoom) : 1;

      if (data.mainColor) {
        state.mainColor = data.mainColor;
        const picker = $("#mainColorPicker");
        if (picker) picker.value = data.mainColor;
      }
      if (data.hookColor) {
        state.hookColor = data.hookColor;
        const picker = $("#hookColorPicker");
        if (picker) picker.value = data.hookColor;
      }
      if (data.mountConfig) {
        state.mountConfig = data.mountConfig || null;
      }

      const maxIdNumber = state.placed
        .map(p => parseInt(String(p.id).replace(/^i/, ""), 10))
        .filter(n => Number.isFinite(n))
        .reduce((max, n) => Math.max(max, n), 0);

      state.nextId = Math.max(Number(data.nextId) || 1, maxIdNumber + 1);

      state.mode = "idle";
      state.moveExisting = null;
      state.selectBox = null;
      state.paletteDrag = false;
      state.draggingPart = null;
      state.ghost = null;
      clearDragPreview();

      render();
    }

    function exportDesign() {
      const data = serializeDesign();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const safeDate = new Date().toISOString().slice(0, 19).replace(/[:T]/g, "-");
      a.href = url;
      a.download = "flow-hook-design-" + safeDate + ".json";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function importDesignFromFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          loadDesignData(data);
        } catch (err) {
          alert("Import failed: The file is not valid JSON.");
        }
      };
      reader.readAsText(file);
    }

      const select = $("#exampleSelect");
      if (!select) return;
      const max = EXAMPLES.length;

      if (index >= max) index = 0;

      select.value = String(index);
      loadSelectedExample();

    window.addEventListener("keydown", ev => {
      if (ev.key.toLowerCase() === "r") {
        ev.preventDefault();
        rotateActive();
        return;
      }
      if (ev.key.toLowerCase() === "d") {
        ev.preventDefault();
        duplicateSelected();
        return;
      }
      if (ev.key.toLowerCase() === "m") {
        ev.preventDefault();
        mirrorSelected();
        return;
      }
      const key = ev.key.toLowerCase();

      if ((ev.ctrlKey || ev.metaKey) && key === "z") {
        ev.preventDefault();

        if (ev.shiftKey) {
          redo();
        } else {
          undo();
        }

        return;
      }

      if ((ev.ctrlKey || ev.metaKey) && key === "y") {
        ev.preventDefault();
        redo();
        return;
      }
      if (ev.key === "Escape" && state.mode === "placing") {
        cancelPlacing();
      }
      if (ev.key === "Delete" || ev.key === "Backspace") {
        if (document.activeElement && document.activeElement.tagName === "TEXTAREA") return;
        ev.preventDefault();
        deleteSelected();
      }
    });

    document.addEventListener("pointerdown", ev => {
      const insideColorDropdown = ev.target.closest(".color-dropdown");
      const insideFloatingPalette = ev.target.closest(".floating-palette");
      const insideMountDropdown = ev.target.closest(".mount-dropdown");

      if (
        insideColorDropdown ||
        insideFloatingPalette ||
        insideMountDropdown
      ) {
        return;
      }

      closeAllColorDropdowns();
    });

    render();
  </script>
</body>

</html>
