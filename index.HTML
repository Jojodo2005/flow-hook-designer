<!doctype html>
<html lang="de">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Flow Hook Designer</title>
  <style>
    :root {
      --bg: #f5f1ea;
      --panel: #fffaf2;
      --ink: #2d2926;
      --muted: #7a7168;
      --line: #ded5c9;
      --accent: #a45858;
      --accent-dark: #783f3f;
      --green: #3ba76d;
      --blue: #4b7bec;
      --danger: #c64646;
      --shadow: 0 18px 45px rgba(0, 0, 0, .08);
      --leftbar-width: 280px;
      --rightbar-width: 240px;
      --topbar-height: 54px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
    }

    body {
      height: 100vh;
      display: grid;
      grid-template-columns: var(--leftbar-width) 1fr var(--rightbar-width);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--ink);
      background: var(--bg);
      overflow: hidden;
    }

    button,
    select,
    input,
    textarea {
      font: inherit;
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 12px;
      padding: 9px 12px;
      font-weight: 700;
      font-size: 12px;
      color: var(--ink);
      cursor: pointer;
      transition: .15s ease;
      touch-action: manipulation;
      white-space: nowrap;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, .08);
    }

    button.primary {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
    }

    button.danger {
      color: #fff;
      background: var(--danger);
      border-color: var(--danger);
    }

    h1 {
      font-size: 20px;
      line-height: 1.1;
      margin: 0 0 6px;
    }

    h2 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .11em;
      color: var(--muted);
      margin: 18px 0 9px;
    }

    label {
      font-size: 12px;
      color: var(--muted);
    }

    input[type="checkbox"] {
      vertical-align: middle;
    }

    .hidden {
      display: none !important;
    }

    /* Layout panels */
    .leftbar,
    .rightbar {
      background: var(--panel);
      z-index: 2;
    }

    .leftbar {
      display: flex;
      flex-direction: column;
      padding: 0;
      overflow: hidden;
      border-right: 1px solid var(--line);
    }

    .left-header {
      flex: 0 0 auto;
      padding: 18px 18px 12px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    .palette-scroll {
      flex: 1 1 auto;
      overflow: auto;
      overscroll-behavior: contain;
      padding: 12px 18px 18px;
    }

    .palette-scroll>div {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .palette-scroll h2 {
      grid-column: 1 / -1;
      margin-top: 14px;
      margin-bottom: 2px;
    }

    .rightbar {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 18px 14px;
      overflow: auto;
      border-left: 1px solid var(--line);
    }

    .rightbar textarea,
    .bom-output {
      width: 100%;
      min-height: 230px;
      flex: 1 1 auto;
      resize: none;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 14px;
      padding: 12px;
      font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: var(--ink);
      white-space: pre-line;
    }

    #exportDesignBtn,
    #importDesignBtn,
    #copyBtn {
      width: 100%;
    }

    main {
      position: relative;
      padding-top: var(--topbar-height);
      overflow: hidden;
      touch-action: none;
      background:
        radial-gradient(circle at 1px 1px, rgba(45, 41, 38, .12) 1px, transparent 0) 0 0/50px 50px,
        linear-gradient(180deg, #faf7f1, #eee7dd);
    }

    #stage {
      width: 100%;
      height: 100%;
      display: block;
      cursor: default;
    }

    /* Top toolbar */
    .topbar {
      position: absolute;
      inset: 0 0 auto 0;
      height: var(--topbar-height);
      z-index: 5;
      pointer-events: none;
    }

    .toolbar-frame {
      pointer-events: auto;
      height: var(--topbar-height);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      touch-action: pan-x;
      background: rgba(255, 250, 242, .96);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 6px 18px rgba(0, 0, 0, .06);
      backdrop-filter: blur(8px);
    }

    .toolbar-frame::-webkit-scrollbar {
      display: none;
    }

    .toolbar-frame>* {
      flex: 0 0 auto;
    }

    .toolbar-frame button,
    .toolbar-frame select {
      height: 36px;
      touch-action: pan-x;
    }

    .example-inline {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 0 0 auto;
    }

    .example-inline select,
    #exampleSelect {
      min-width: 150px;
      max-width: 210px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0 10px;
      background: #fff;
      color: var(--ink);
      font-weight: 700;
    }

    .grid-mini {
      margin-left: 0;
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    /* Palette parts */
    .part {
      user-select: none;
      display: grid;
      grid-template-columns: 1fr;
      gap: 7px;
      justify-items: center;
      align-items: center;
      min-height: 104px;
      padding: 9px 7px;
      margin-bottom: 8px;
      text-align: center;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 16px;
      cursor: grab;
      transition: .15s ease;
    }

    .part:hover {
      transform: scale(1.035);
      border-color: #c9b8a7;
      box-shadow: 0 8px 20px rgba(0, 0, 0, .08);
    }

    .part:active {
      cursor: grabbing;
    }

    .thumb {
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4ece3;
      border-radius: 12px;
      overflow: hidden;
    }

    .thumb svg {
      max-width: 58px;
      max-height: 58px;
      width: auto;
      height: auto;
    }

    .part-name {
      font-weight: 700;
      font-size: 11px;
      line-height: 1.15;
    }

    .part-meta {
      display: none;
    }

    .palette-divider {
      height: 1px;
      margin: 6px 10px;
      background: #ccc;
      border-radius: 1px;
    }

    /* Color and mount dropdowns */
    .color-dropdown,
    .mount-dropdown {
      position: relative;
    }

    .sidebar-color-dropdown {
      margin-top: 10px;
    }

    .color-menu-btn,
    .sidebar-color-btn {
      height: 36px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 10px;
    }

    .sidebar-color-btn,
    #mountConfigMenuBtn {
      width: 100%;
      height: 42px;
      justify-content: space-between;
      text-wrap-mode: wrap;
    }

    .color-preview {
      width: 24px;
      height: 18px;
      border-radius: 2px;
      border: 1px solid #0002;
      background: #a45858;
      flex: 0 0 auto;
    }

    .palette-container,
    .mount-menu {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      z-index: 30;
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: max-content;
      min-width: 140px;
      max-width: min(260px, 90vw);
      padding: 8px;
      box-sizing: border-box;
      overflow-wrap: break-word;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .14);
    }

    .mount-menu {
      width: 100%;
      min-width: 0;
      max-width: 100%;
    }

    .palette-row {
      display: flex;
      gap: 6px;
    }

    .palette-label {
      font-size: 10px;
      font-weight: 800;
      color: var(--muted);
      margin-top: 4px;
    }

    .palette-color {
      width: 20px;
      height: 20px;
      border: 1px solid #0002;
      border-radius: 6px;
      cursor: pointer;
    }

    .palette-color:hover {
      transform: scale(1.1);
    }

    .palette-custom-btn,
    .mount-menu button {
      width: 100%;
      height: auto;
      min-height: 32px;
      padding: 6px 8px;
      white-space: normal;
      text-align: left;
    }

    .hidden-color-input {
      position: absolute;
      width: 44px;
      height: 36px;
      opacity: 0.01;
      pointer-events: auto;
    }

    .mount-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    #mountConfigPreview {
      width: auto;
      min-width: 72px;
      height: auto;
      border-radius: 999px;
      border: 1px solid #0002;
      background: #f4ece3;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 8px;
      font-size: 10px;
      font-weight: 800;
      color: var(--muted);
      text-wrap-mode: wrap;
    }

    #mountConfigMenu {
      width: auto;
    }

    .mount-info-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: auto;
      min-width: 20px;
      height: 70%;
      padding: 0 4px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-decoration: none;
    }

    .mount-info-link:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    /* Selected object action bar */
    .canvas-actions {
      position: absolute;
      top: calc(var(--topbar-height) + 12px);
      right: 16px;
      z-index: 6;
      display: none;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      max-width: calc(100% - 32px);
      padding: 8px;
      overflow-x: auto;
      overflow-y: hidden;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      touch-action: pan-x;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 250, 242, .94);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .floating-palette {
      position: fixed !important;
      top: 0;
      left: 0;
      width: 140px !important;
      max-width: calc(100vw - 16px) !important;
      z-index: 99999 !important;
    }

    .canvas-actions.visible {
      display: flex;
    }

    .canvas-actions::-webkit-scrollbar {
      display: none;
    }

    .canvas-actions>* {
      flex: 0 0 auto;
    }

    .canvas-actions button,
    .canvas-actions select,
    .canvas-actions .color-dropdown {
      touch-action: pan-x;
    }

    .canvas-actions .palette-container {
      top: calc(100% + 6px);
      max-width: min(260px, calc(100vw - 32px));
    }

    /* SVG canvas layers */
    .placed-shape .shape-svg {
      filter: drop-shadow(0 7px 10px rgba(0, 0, 0, .12));
    }

    .shape-outline {
      display: none;
      fill: none;
      stroke: none;
      pointer-events: none;
    }

    .placed-shape.selected .shape-outline {
      display: block;
      fill: none;
      stroke: var(--blue);
      stroke-width: 2;
      stroke-dasharray: 5 4;
      pointer-events: none;
    }

    .snap-point {
      pointer-events: none;
      stroke: #fff;
      stroke-width: 2;
    }

    .snap-open {
      fill: var(--blue);
    }

    .snap-active {
      fill: #222;
    }

    .snap-valid {
      fill: var(--green);
    }

    .ghost {
      opacity: .72;
      pointer-events: none;
    }

    .ghost.valid {
      opacity: .86;
    }

    .selection-rect {
      fill: rgba(75, 123, 236, .10);
      stroke: var(--blue);
      stroke-width: 1.5;
      stroke-dasharray: 6 4;
      pointer-events: none;
    }

    .connection-line {
      stroke: rgba(59, 167, 109, .5);
      stroke-width: 3;
      stroke-linecap: round;
      pointer-events: none;
    }

    .drag-preview {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 9999;
      pointer-events: none;
      opacity: .9;
      filter: drop-shadow(0 14px 24px rgba(0, 0, 0, .18));
      transform: translate(-50%, -50%);
    }

    .drag-preview svg {
      display: block;
      overflow: visible;
    }

    body.palette-dragging,
    body.palette-dragging .palette-scroll {
      overflow: hidden !important;
      overscroll-behavior: none !important;
      touch-action: none;
    }

    body.drop-delete-active .leftbar {
      outline: 3px dashed var(--danger);
      outline-offset: -8px;
      background: #fff1ef;
    }

    .selection-size-info {
      position: absolute;
      right: 16px;
      bottom: 16px;
      z-index: 7;

      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 250, 242, .94);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);

      font-size: 12px;
      font-weight: 700;
      color: var(--ink);
      pointer-events: none;
      white-space: nowrap;
    }

    .selection-size-info .muted {
      color: var(--muted);
      font-weight: 600;
    }

    /* Responsive layout */
    @media (max-width: 980px) {
      :root {
        --leftbar-width: 220px;
        --rightbar-width: 210px;
      }

      .left-header,
      .palette-scroll,
      .rightbar {
        padding-left: 10px;
        padding-right: 10px;
      }

      .toolbar-frame {
        padding-left: 8px;
        padding-right: 8px;
      }

      button {
        padding-left: 10px;
        padding-right: 10px;
      }

      .example-inline select,
      #exampleSelect {
        min-width: 120px;
        max-width: 160px;
      }
    }

    @media (max-width: 720px) {
      :root {
        --leftbar-width: 118px;
        --rightbar-width: 128px;
      }

      h1 {
        font-size: 14px;
      }

      h2 {
        font-size: 10px;
        letter-spacing: .06em;
      }

      .left-header,
      .palette-scroll,
      .rightbar {
        padding-left: 6px;
        padding-right: 6px;
      }

      .palette-scroll>div {
        grid-template-columns: 1fr;
      }

      .part {
        min-height: 82px;
        padding: 6px 4px;
      }

      .thumb {
        width: 52px;
        height: 52px;
      }

      .thumb svg {
        max-width: 48px;
        max-height: 48px;
      }

      .part-name {
        font-size: 10px;
      }

      .rightbar textarea,
      .bom-output {
        min-height: 180px;
        font-size: 10px;
        padding: 8px;
      }

      .canvas-actions {
        top: calc(var(--topbar-height) + 8px);
        right: 8px;
        max-width: calc(100% - 16px);
      }
    }
  </style>
</head>

<body>
  <aside class="leftbar" id="leftbar">
    <div class="left-header">
      <h1>Flow Hook Designer</h1>

      <div class="color-dropdown sidebar-color-dropdown">
        <button id="globalMainColorMenuBtn" class="color-menu-btn sidebar-color-btn">
          <span>Main Color</span>
          <span id="globalMainColorPreview" class="color-preview"></span>
        </button>
        <div class="palette-container hidden" id="globalMainPalette"></div>
        <input id="mainColorPicker" type="color" value="#a45858" class="hidden-color-input">
      </div>

      <div class="color-dropdown sidebar-color-dropdown">
        <button id="globalHookColorMenuBtn" class="color-menu-btn sidebar-color-btn">
          <span>Hook Color</span>
          <span id="globalHookColorPreview" class="color-preview"></span>
        </button>
        <div class="palette-container hidden" id="globalHookPalette"></div>
        <input id="hookColorPicker" type="color" value="#5b3434" class="hidden-color-input">
      </div>


    </div>
    <div id="palette" class="palette-scroll"></div>
  </aside>

  <main id="canvasWrap">
    <div class="topbar">
      <div class="toolbar-frame">
        <button id="undoBtn" title="Undo">Undo</button>
        <button id="redoBtn" title="Redo">Redo</button>
        <button id="clearBtn">Clear</button>
        <button id="randomBtn">Random</button>
        <div class="example-inline">
          <select id="exampleSelect" title="Select Example"></select>
          <button id="prevExampleBtn" title="Previous Example">◀</button>
          <button id="nextExampleBtn" title="Next Example">▶</button>
        </div>
        <label class="grid-mini"><input id="gridToggle" type="checkbox" checked> Grid</label>
        <button id="fitBtn">Center</button>
      </div>
    </div>

    <div class="canvas-actions" id="canvasActions">
      <div class="color-dropdown">
        <button id="mainColorMenuBtn" class="color-menu-btn">
          <span>Main</span>
          <span id="mainColorPreview" class="color-preview"></span>
        </button>
        <div class="palette-container hidden" id="mainPalette"></div>
        <input id="selectedMainColorPicker" type="color" value="#a45858" class="hidden-color-input">
      </div>

      <div class="color-dropdown">
        <button id="hookColorMenuBtn" class="color-menu-btn">
          <span>Hook</span>
          <span id="hookColorPreview" class="color-preview"></span>
        </button>
        <div class="palette-container hidden" id="hookPalette"></div>
        <input id="selectedHookColorPicker" type="color" value="#5b3434" class="hidden-color-input">
      </div>

      <button id="mirrorBtn" title="Mirror selected part">Mirror</button>
      <button id="rotateBtn" title="Rotate selected part by 90°">90°</button>
      <button id="rotate45Btn" title="Rotate selected part by 45°">45°</button>
      <button id="duplicateBtn" title="Duplicate selected part">Duplicate</button>
      <button id="deleteBtn" class="danger" title="Delete selection">Delete</button>
    </div>

    <div id="selectionSizeInfo" class="selection-size-info hidden"></div>

    <svg id="stage" xmlns="http://www.w3.org/2000/svg">
      <g id="viewport">
        <g id="connectionsLayer"></g>
        <g id="shapesLayer"></g>
        <g id="snapLayer"></g>
        <g id="ghostLayer"></g>
        <g id="selectionLayer"></g>
      </g>
    </svg>
  </main>

  <section class="rightbar">
    <h1>Input/Output</h1>


    <button id="importDesignBtn">Import Design</button>
    <button id="exportDesignBtn">Export Design</button>
    <input id="importDesignInput" type="file" accept="application/json,.json,.txt" style="display:none">


    <h2>Parts List</h2>
    <div class="mount-dropdown sidebar-mount-dropdown">
      <button id="mountConfigMenuBtn" class="color-menu-btn sidebar-color-btn">
        <span>Wall Mount</span>
        <span id="mountConfigPreview">Select Wall Mount</span>
        <a class="mount-info-link"
          href="https://makerworld.com/en/models/2632911-upgrade-kit-for-legos-speed-champions-gt3-rs#profileId-2907619:~:text=Description"
          target="_blank" rel="noopener noreferrer" title="More information about wall mount options"
          onclick="event.stopPropagation();">ⓘ</a>
      </button>
      <div class="mount-menu hidden" id="mountConfigMenu">
        <button class="palette-custom-btn" data-mount-config="countersunk">
          Wall Mount with Countersunk Screw
        </button>
        <button class="palette-custom-btn" data-mount-config="roundhead">
          Wall Mount with Round Head Screw
        </button>
        <button class="palette-custom-btn" data-mount-config="tape">
          Double-Sided Tape
        </button>
      </div>
    </div>
    <div id="bom" class="bom-output"></div>
    <button id="copyBtn" class="primary">Copy Parts List</button>

    <div style="display:none">
      <strong id="partCount">0</strong>
      <strong id="selectionCount">0</strong>
      <strong id="connectionCount">0</strong>
    </div>
  </section>

    const CONFIG = {
      gridSize: 50,
      snapDistance: 18,
      snapAngleTolerance: 0
    };


    const historyStack = [];
    const redoStack = [];

    function saveState() {
      historyStack.push(getStateSnapshot());

      if (historyStack.length > 50) {
        historyStack.shift();
      }

      // Sobald eine neue Änderung gemacht wird,
      // ist die alte Redo-Kette nicht mehr gültig.
      redoStack.length = 0;
    }

    function getStateSnapshot() {
      return JSON.stringify({
        placed: state.placed,
        connections: state.connections,
        selection: Array.from(state.selection),
        nextId: state.nextId,
        mountConfig: state.mountConfig
      });
    }

    function restoreStateSnapshot(snapshot) {
      const data = JSON.parse(snapshot);

      state.placed = data.placed || [];
      state.connections = data.connections || [];
      state.selection = new Set(data.selection || []);
      state.nextId = data.nextId || 1;
      state.mountConfig = data.mountConfig || null;

      render();
    }

    const colorDropdowns = [];

    const PX_TO_CM = 0.12;

    function formatCm(valuePx) {
      return (valuePx * PX_TO_CM).toFixed(1);
    }

    function getSelectionBounds() {
      if (!state.selection || state.selection.size === 0) return null;

      let minX = Infinity;
      let minY = Infinity;
      let maxX = -Infinity;
      let maxY = -Infinity;

      for (const id of state.selection) {
        const inst = state.placed.find(p => p.id === id);
        if (!inst) continue;

        const b = instanceBounds(inst);

        minX = Math.min(minX, b.x1);
        minY = Math.min(minY, b.y1);
        maxX = Math.max(maxX, b.x2);
        maxY = Math.max(maxY, b.y2);
      }

      if (!Number.isFinite(minX)) return null;

      return {
        x1: minX,
        y1: minY,
        x2: maxX,
        y2: maxY,
        width: maxX - minX,
        height: maxY - minY
      };
    }

    function updateSelectionSizeInfo() {
      const el = $("#selectionSizeInfo");
      if (!el) return;

      const bounds = getSelectionBounds();

      if (!bounds) {
        el.classList.add("hidden");
        el.innerHTML = "";
        return;
      }

      const widthCm = formatCm(bounds.width);
      const heightCm = formatCm(bounds.height);

    function undo() {
      if (historyStack.length === 0) return;

      redoStack.push(getStateSnapshot());

      const previous = historyStack.pop();
      restoreStateSnapshot(previous);
    }

    function redo() {
      if (redoStack.length === 0) return;

      historyStack.push(getStateSnapshot());

      const next = redoStack.pop();
      restoreStateSnapshot(next);
    }

    const state = {
      mode: "idle",
      placed: [],
      connections: [],
      selection: new Set(),
      draggingPart: null,

      paletteDrag: false,
      dragPreviewEl: null,
      nextId: 1,
      pointer: { x: 0, y: 0 },
      pan: { x: 0, y: 0 },
      zoom: 1,
      panning: false,
      panStart: null,
      moveExisting: null,
      selectBox: null,

    function categoryLabel(cat) {
      return cat === "hook" ? "Hook Parts" : cat === "connector" ? "Connector Parts" : "End Parts";
    }

    function setupPalette() {
      palette.innerHTML = "";
      const order = ["hook", "connector", "end"];
      for (const cat of order) {
        const group = document.createElement("div");
        const h = document.createElement("h2");

        PARTS.filter(p => p.category === cat).forEach(part => {
